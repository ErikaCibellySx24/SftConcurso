<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Calendário</title>
<link rel="stylesheet" href="../css/style.css">
<link rel="manifest" href="/manifest.json">
</head>
<body>

<div class="sidebar">
  <h2>🚔 Police Tracker</h2>
  <a href="/pages/dashboard.html">🏠 Dashboard</a>
  <a href="/pages/cronograma.html">📅 Cronograma</a>
  <a href="/pages/materias.html">📚 Matérias</a>

  <button id="toggleTheme" class="theme-btn">

</button>

<div class="main">

  <div class="card">
    <h1>📅 Calendário de Estudos</h1>
    <p>Clique em um dia para adicionar sua tarefa</p>
  </div>

  <div class="card">
    <div id="calendar"></div>
  </div>

</div>

<!-- Modal simples -->
<div id="modal" class="modal">
  <div class="modal-content">
    <h3>Adicionar estudo</h3>
    <input type="text" id="taskInput" placeholder="Ex: Penal - 2h">
    <button onclick="saveTask()">Salvar</button>
    <button onclick="closeModal()">Fechar</button>
  </div>
</div>
<script src="../js/calendario.js"></script>
