<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta</title>

    <link rel="stylesheet" href="../css/style.css">
</head>

<body class="login-body">

<div class="login-container">

    <div class="login-card">

        <h1>Police Tracker</h1>
        <p>Crie sua conta para começar seus estudos.</p>

        <form id="cadastroForm">

            <div class="input-group">
                <label>Nome</label>
                <input type="text" id="nome" placeholder="Seu nome completo" required>
            </div>

            <div class="input-group">
                <label>Celular</label>
                <input type="number" id="celular" placeholder="(00) 9000-0000" required>
            </div>

            <div class="input-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="Seu melhor email" required>
            </div>

            <div class="input-group">
                <label>Senha</label>
                <input type="password" id="senha" placeholder="Mínimo de 8 caracteres" required>
            </div>

            <div class="input-group">
                <label>Confirmar senha</label>
                <input type="password" id="confirmarSenha" placeholder="Digite novamente" required>
            </div>
            <div class="input-group">
                <label>Área de Concurso</label>

                <select id="areaConcurso" required>
                    <option value="">Selecione</option>
                    <option value="civil">Polícia Civil</option>
                    <option value="militar">Polícia Militar</option>
                    <option value="ambiental">Meio Ambiente / Ambiental</option>
                </select>
            </div>

            <button type="submit">
                Criar Conta
            </button>

        </form>

        <div class="extra">
            <span>Já possui uma conta?</span>
            <a href="login.html">Entrar</a>
        </div>

    </div>

</div>

<script src="../js/cadastro.js"></script>

</body>
</html>
