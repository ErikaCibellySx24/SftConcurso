<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="sidebar">
  <h2>🚔 Police Tracker</h2>
  <a href="/pages/dashboard.html">🏠 Dashboard</a>
  <a href="/pages/cronograma.html">📅 Cronograma</a>
  <a href="/pages/materias.html">📚 Matérias</a>
  <a href="/pages/questoes.html">❓ Questões</a>
  <a href="/pages/revisoes.html">🧠 Revisões</a>
  <a href="/pages/estatisticas.html">📊 Estatísticas</a>
  <a href="/pages/calendario.html">🗓 Calendário</a>
  <button id="toggleTheme" class="theme-btn">
  🌙 Modo Noturno
</button>
</div>

<div class="main">

  <div class="card">
    <h1>Bem-vindo ao Police Tracker Pro</h1>
    <p>Seu painel de estudos inteligente.</p>
  </div>

  <div class="grid" id="cards"></div>

  <div class="card">
    <h2>📈 Progresso semanal</h2>
    <canvas id="grafico"></canvas>
  </div>

</div>
<div class="card">
  <h2>📥 Importar Estudos em Massa</h2>

  <textarea id="importText" rows="6" style="width:100%;padding:10px;border-radius:10px;border:1px solid #ccc;"
    placeholder="Materia,hora,data&#10;Penal,2,2026-06-25"></textarea>

  <button onclick="importarEstudos()" class="theme-btn" style="margin-top:10px;">
    Importar
  </button>

  <p id="statusImport"></p>
</div>

<script src="../js/dashboard.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
const ctx = document.getElementById('grafico');
new Chart(ctx, {
  type: 'bar',
  data: {
    labels: ['Seg','Ter','Qua','Qui','Sex','Sáb'],
    datasets: [{
      label: 'Horas',
      data: [2,3,1,4,2,5],
      backgroundColor:'#8B7CF6'
    }]
  }
});
</script>
<script src="../js/dashboard.js"></script>
<script src="/js/theme.js"></script>
</body>
</html>
