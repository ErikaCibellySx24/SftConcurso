<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Estatísticas</title>
<link rel="stylesheet" href="../css/style.css">
<link rel="manifest" href="/manifest.json">
</head>
<body>

<div class="sidebar">
  <h2>🚔 Police Tracker</h2>
  <a href="/pages/dashboard.html">🏠 Dashboard</a>
  <a href="/pages/cronograma.html">📅 Cronograma</a>
  <a href="/pages/materias.html">📚 Matérias</a>
  <a href="/pages/questoes.html">❓ Questões</a>
  <a href="/pages/revisoes.html">🧠 Revisões</a>
  <a href="/pages/estatisticas.html">📊 Estatísticas</a>
  <a href="/pages/calendario.html">🗓 Calendário</a>
  <button id="toggleTheme" class="theme-btn">
  🌙 Modo Noturno
</button>
</div>

<div class="main">

  <div class="card">
    <h1>📊 Seu desempenho geral</h1>
  </div>

  <!-- RESUMO GERAL -->
  <div class="card" id="resumoGeral"></div>

  <!-- RESUMO POR MATÉRIA -->
  <div class="card">
    <h2>📚 Resumo por matéria</h2>
    <div id="resumoMaterias"></div>
  </div>

  <!-- FILTRO + GRÁFICO -->
  <div class="card">
    <h2>📈 Evolução</h2>

    <select id="modo">
      <option value="geral">Geral</option>
      <option value="materia">Por matéria</option>
    </select>

    <select id="materiaSelect" style="display:none;"></select>

    <canvas id="graf1"></canvas>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="../js/estatisticas.js"></script>
<script src="/js/theme.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
new Chart(document.getElementById("graf1"), {
  type:"line",
  data:{
    labels:["Jan","Fev","Mar","Abr"],
    datasets:[{
      label:"Evolução",
      data:[40,60,70,90],
      borderColor:"#8B7CF6"
    }]
  }
});
</script>
<script src="../js/estatisticas.js"></script>
<script src="/js/theme.js"></script>
</body>
</html>
